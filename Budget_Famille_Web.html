// =========================================================
// VALIDATION RAPIDE DES PRÉ-CLASSIFICATIONS
// =========================================================
// Affiché après import CSV si des règles mémorisées correspondent
// à des opérations. Présente un tableau "ces opérations ont été
// reconnues automatiquement — confirmez ou corrigez".

// Point d'entrée pour un import mono-mois (compatibilité avec l'existant)
function ouvrirValidationPreclassification(moisKey, preClassees){
  if(!preClassees || preClassees.length === 0) return;
  const items = preClassees.map(item => ({ ...item, moisKey }));
  ouvrirValidationPreclassificationMultiMois(items);
}

// Point d'entrée pour un import potentiellement réparti sur plusieurs mois.
// Chaque item doit porter sa propre propriété moisKey.
function ouvrirValidationPreclassificationMultiMois(items){
  if(!items || items.length === 0) return;
  const multiMois = new Set(items.map(i => i.moisKey)).size > 1;

  let sortCol = "date";
  let sortDir = "asc";

  function getSorted(){
    return [...items].sort((a, b) => {
      let va, vb;
      if(sortCol === "date")       { va = a.op.date; vb = b.op.date; }
      else if(sortCol === "libelle")  { va = (a.op.libelle||"").toLowerCase(); vb = (b.op.libelle||"").toLowerCase(); }
      else if(sortCol === "confiance"){ va = a.score||0; vb = b.score||0; }
      const cmp = va < vb ? -1 : va > vb ? 1 : 0;
      return sortDir === "asc" ? cmp : -cmp;
    });
  }

  function buildSortBtns(){
    return [["date","Date"],["libelle","Libellé"],["confiance","Confiance"]].map(([key,label]) => {
      const active = sortCol === key;
      const arrow = active ? (sortDir === "asc" ? " ▲" : " ▼") : "";
      return `<button class="preclass-sort-btn" data-sort="${key}"
        style="background:${active?"var(--terracotta-soft)":"none"}; border:none; cursor:pointer;
        font-size:11px; font-weight:${active?700:600}; color:${active?"var(--terracotta)":"var(--ink-soft)"};
        text-transform:uppercase; letter-spacing:.04em; padding:4px 8px; border-radius:5px;">
        ${label}${arrow}</button>`;
    }).join("");
  }

  function buildLignes(){
    return getSorted().map(item => {
      const origIdx = items.indexOf(item);
      const montantClass = item.op.montant >= 0 ? "credit" : "debit";
      const confiance = item.score >= 5 ? "Haute" : item.score >= 2 ? "Moyenne" : "Faible";
      const confianceColor = item.score >= 5 ? "var(--sapin)" : item.score >= 2 ? "var(--ambre)" : "var(--ink-soft)";
      const colMois = multiMois ? `<td style="padding:10px 8px; font-size:12px; color:var(--ink-soft); white-space:nowrap;">${moisLabel(item.moisKey)}</td>` : "";

      const tooltipParts = [];
      if(item.op.libelleOperation) tooltipParts.push(item.op.libelleOperation);
      if(item.op.sousCategorie) tooltipParts.push("Sous-cat. : " + item.op.sousCategorie);
      if(item.op.detail) tooltipParts.push(item.op.detail);
      const libelleHtml = tooltipParts.length
        ? `<span class="has-tooltip" data-tooltip="${escapeAttr(tooltipParts.join(' | '))}">${escapeHtml(item.op.libelle)}</span>`
        : escapeHtml(item.op.libelle);

      return `
      <tr data-preclass-idx="${origIdx}">
        <td style="padding:10px 14px;"><input type="checkbox" class="op-checkbox preclass-chk" data-idx="${origIdx}" checked></td>
        ${colMois}
        <td style="padding:10px 8px; font-size:12.5px; color:var(--ink-soft); white-space:nowrap;">${fmtDateFr(item.op.date)}</td>
        <td style="padding:10px 8px; font-size:13px; font-weight:600;">${libelleHtml}</td>
        <td style="padding:10px 8px; text-align:right; font-size:13px;" class="amount-cell ${montantClass}">
          ${item.op.montant >= 0 ? "+" : ""}${fmtEUR(item.op.montant, true)}
        </td>
        <td style="padding:10px 8px;">
          <span class="cat-pill assigned preclass-cat-pill" data-idx="${origIdx}" style="cursor:pointer;" title="Cliquer pour changer">
            ${escapeHtml(item.categorie)}
          </span>
        </td>
        <td style="padding:10px 8px; font-size:11px; color:${confianceColor}; font-weight:600; text-transform:uppercase; letter-spacing:.04em;">
          ${confiance}
        </td>
      </tr>`;
    }).join("");
  }

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay open";
  overlay.id = "preClassOverlay";

  const categoriesModifiees = {};
  items.forEach((item, idx) => { categoriesModifiees[idx] = item.categorie; });

  function buildHTML(){
    return `
    <div class="modal-card" style="max-width:860px; max-height:90vh;">
      <div class="modal-head">
        <div>
          <div class="modal-progress">Apprentissage automatique</div>
          <div class="modal-op-libelle display">${items.length} opération${items.length>1?"s":""} reconnue${items.length>1?"s":""}</div>
          <div class="modal-op-detail">Ces opérations correspondent à des libellés déjà classés. Vérifiez et confirmez (ou corrigez) les catégories proposées.</div>
        </div>
        <button class="modal-close" id="closePreClassBtn" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-body" style="padding:0;">
        <div style="padding:10px 22px; background:var(--ambre-soft); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:12.5px;">
            <input type="checkbox" id="chkPreclassAll" checked style="accent-color:var(--terracotta);">
            <span>Tout sélectionner / désélectionner</span>
          </label>
          <div style="display:flex; align-items:center; gap:4px;">
            <span style="font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); font-weight:600; margin-right:4px;">Trier par</span>
            <span id="sortBtnsZone">${buildSortBtns()}</span>
          </div>
        </div>
        <div style="overflow-y:auto; max-height:calc(90vh - 300px);">
          <table style="width:100%; border-collapse:collapse;">
            <thead>
              <tr style="background:var(--cream-deep);">
                <th style="padding:8px 14px; width:36px;"></th>
                ${multiMois ? `<th style="padding:8px 8px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); font-weight:600;">Mois</th>` : ""}
                <th style="padding:8px 8px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); font-weight:600;">Date</th>

          </table>
        </div>
      </div>
      <div class="modal-foot" style="justify-content:space-between;">
        <button class="btn btn-ghost btn-sm" id="btnPreclassIgnorer">Ignorer et classer manuellement</button>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-secondary btn-sm" id="btnPreclassSkipChecked">Ne pas pré-classer la sélection</button>
          <button class="btn btn-primary" id="btnPreclassValider">Valider les catégories cochées →</button>
        </div>
      </div>
    </div>`;
  }

  overlay.innerHTML = buildHTML();
  document.body.appendChild(overlay);

  function bindAll(){
    overlay.querySelector("#closePreClassBtn").addEventListener("click", () => overlay.remove());
    overlay.addEventListener("click", (e) => { if(e.target === overlay) overlay.remove(); });

    overlay.querySelector("#chkPreclassAll").addEventListener("change", (e) => {
      overlay.querySelectorAll(".preclass-chk").forEach(cb => { cb.checked = e.target.checked; });
    });

    // Boutons de tri
    overlay.querySelectorAll(".preclass-sort-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const col = btn.dataset.sort;
        if(sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
        else { sortCol = col; sortDir = col === "confiance" ? "desc" : "asc"; }
        overlay.querySelector("#sortBtnsZone").innerHTML = buildSortBtns();
        overlay.querySelector("#preClassTableBody").innerHTML = buildLignes();
        bindRowEvents();
        // Rebind tri (les boutons ont été recréés)
        overlay.querySelectorAll(".preclass-sort-btn").forEach(b => {
          b.addEventListener("click", () => b.click());
        });
        bindAll_tri();
      });
    });

    overlay.querySelector("#btnPreclassIgnorer").addEventListener("click", () => { overlay.remove(); openClassificationModal(); });

    overlay.querySelector("#btnPreclassSkipChecked").addEventListener("click", () => {
      overlay.querySelectorAll(".preclass-chk:checked").forEach(chk => {
        chk.closest("tr").style.opacity = "0.35";
        chk.checked = false;
      });
      overlay.querySelector("#chkPreclassAll").checked = false;
    });

    overlay.querySelector("#btnPreclassValider").addEventListener("click", () => {
      let nbValidees = 0;
      overlay.querySelectorAll(".preclass-chk:checked").forEach(chk => {
        const idx = parseInt(chk.dataset.idx);
        const item = items[idx];
        const cat = categoriesModifiees[idx];
        classerOperation(item.moisKey, item.op.id, cat);
        apprentissage(item.op.libelle, cat, item.op.montant);
        nbValidees++;
      });
      overlay.remove();
      render();
      showToast(`${nbValidees} opération${nbValidees>1?"s":""} pré-classée${nbValidees>1?"s":""}. Les opérations restantes vous attendent dans le classement.`);
    });

    bindRowEvents();
  }

  function bindAll_tri(){
    overlay.querySelectorAll(".preclass-sort-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const col = btn.dataset.sort;
        if(sortCol === col) sortDir = sortDir === "asc" ? "desc" : "asc";
        else { sortCol = col; sortDir = col === "confiance" ? "desc" : "asc"; }
        overlay.querySelector("#sortBtnsZone").innerHTML = buildSortBtns();
        overlay.querySelector("#preClassTableBody").innerHTML = buildLignes();
        bindRowEvents();
        bindAll_tri();
      });
    });
  }

  function bindRowEvents(){
    overlay.querySelectorAll(".preclass-cat-pill").forEach(pill => {
      pill.addEventListener("click", () => {
        const idx = parseInt(pill.dataset.idx);
        ouvrirChoixCategoriePour(idx, categoriesModifiees, pill, overlay, items[idx]);
      });
    });
  }

  bindAll();
}

        const confiance = r.score >= 5 ? "Haute" : r.score >= 2 ? "Moyenne" : "Faible";
        const confianceColor = r.score >= 5 ? "var(--sapin)" : r.score >= 2 ? "var(--ambre)" : "var(--ink-soft)";

            ${confiance} (${r.score})

          <td style="padding:10px 8px; text-align:right;">
            <button class="btn btn-ghost btn-sm" style="color:var(--rouge); font-size:11.5px;" data-del-regle="${escapeAttr(cle)}">Supprimer</button>
          </td>
        </tr>`;

      <div class="modal-head">
        <div>
          <div class="modal-progress">Règles mémorisées — ${entries.length} règle${entries.length>1?'s':''}</div>

            Supprimez les règles incorrectes ou effacez tout pour repartir de zéro.
          </div>
        </div>
        <button class="modal-close" id="closeApprentissagesBtn">✕</button>
      </div>
      <div class="modal-body" style="padding:0; overflow-y:auto; max-height:calc(88vh - 260px);">
        ${entries.length > 0 ? `
        <div style="padding:10px 14px; background:var(--cream-deep); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px;">
          <input type="text" id="filtreRegles" placeholder="Filtrer par libellé ou catégorie..." style="flex:1; border:1px solid var(--line); border-radius:7px; padding:7px 11px; font-size:13px; background:var(--card);">
        </div>` : ""}
        <table style="width:100%; border-collapse:collapse;" id="reglesTable">
          <thead>
            <tr style="background:var(--cream-deep); border-bottom:1px solid var(--line);">
              <th style="padding:8px 14px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); font-weight:600; text-align:left;">Libellé reconnu</th>
              <th style="padding:8px 8px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); font-weight:600; text-align:left;">Catégorie associée</th>
              <th style="padding:8px 8px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); font-weight:600;">Confiance</th>

    saveState();

  });
}

function generateShades(hex, count){
  // Génère `count` teintes dérivées de la couleur de base (plus clair à plus foncé)
  const {r,g,b} = hexToRgb(hex);
  const shades = [];
  for(let i=0; i<count; i++){
    const factor = count <= 1 ? 1 : 0.55 + (0.85 * i / (count-1)); // de clair (0.55) à foncé proche de 1.4
    const adj = 1.4 - (factor - 0.55); // inverse: premier = plus saturé, dernier = plus clair
    shades.push(adjustShade(r,g,b, 1.25 - (i/(count*1.3))));
  }
  return shades;
}
function hexToRgb(hex){
  const v = hex.replace("#","");
  return { r: parseInt(v.slice(0,2),16), g: parseInt(v.slice(2,4),16), b: parseInt(v.slice(4,6),16) };
}
function adjustShade(r,g,b,factor){
  const f = (c) => Math.max(0, Math.min(255, Math.round(c*factor)));
  return `rgb(${f(r)},${f(g)},${f(b)})`;
}

};

function renderSyntheseSectionTable(sectionKey, moisRevolus){
  const section = CATEGORIES[sectionKey];
  const reals = moisRevolus.map(m => realParCategorie(m));
  const sort = syntheseSort[sectionKey] || { col: null, dir: "desc" };

  // Construire les données par catégorie
  let items = section.items.map(cat => {
    const valeurs = reals.map(r => r[cat] || 0);
    const moyenne = valeurs.reduce((s,v) => s+v, 0) / valeurs.length;
    const totalCat = valeurs.reduce((s,v) => s+v, 0);
    return { cat, valeurs, moyenne, totalCat };
  }).filter(item => item.totalCat > 0);

  if(!items.length) return "";

  // Trier selon la colonne active
  if(sort.col === "moyenne"){
    items.sort((a,b) => sort.dir === "asc" ? a.moyenne - b.moyenne : b.moyenne - a.moyenne);
  } else if(sort.col !== null){
    // col est un index de mois (0, 1, 2...)
    const idx = sort.col;
    items.sort((a,b) => sort.dir === "asc"
      ? (a.valeurs[idx]||0) - (b.valeurs[idx]||0)
      : (b.valeurs[idx]||0) - (a.valeurs[idx]||0));
  }

  const rows = items.map(({ cat, valeurs, moyenne }) => {
    const cells = valeurs.map(v => `<td style="text-align:right; padding:8px 10px;">${fmtEUR(v)}</td>`).join("");
    return `<tr>
      <td style="padding:8px 14px;">${cat}</td>
      ${cells}
      <td style="text-align:right; font-weight:600; padding:8px 10px;">${fmtEUR(moyenne)}</td>
    </tr>`;
  }).join("");

  const totalRow = (() => {
    const totauxParMois = moisRevolus.map(m => totalSection(m, sectionKey));
    const moyenneTotal = totauxParMois.reduce((s,v)=>s+v,0) / totauxParMois.length;
    const cells = totauxParMois.map(v => `<td style="text-align:right; padding:8px 10px;">${fmtEUR(v)}</td>`).join("");
    return `<tr class="synthese-total-row">
      <td style="padding:8px 14px;">Total ${section.label}</td>
      ${cells}
      <td style="text-align:right; font-weight:600; padding:8px 10px;">${fmtEUR(moyenneTotal)}</td>
    </tr>`;
  })();

  // En-têtes cliquables avec indicateur de tri
  const thStyle = `text-align:right; padding:8px 10px; cursor:pointer; user-select:none; white-space:nowrap;`;
  const thActive = `background:var(--cream-deep);`;

  const headerCells = moisRevolus.map((m, idx) => {
    const isActive = sort.col === idx;
    const arrow = isActive ? (sort.dir === "asc" ? " ▲" : " ▼") : "";
    return `<th style="${thStyle}${isActive?thActive:''}"
      data-synthese-sort-sec="${sectionKey}" data-synthese-sort-col="${idx}">
      ${moisLabel(m).split(" ")[0].slice(0,3)}${arrow}
    </th>`;
  }).join("");

  const isMoyActive = sort.col === "moyenne";
  const moyArrow = isMoyActive ? (sort.dir === "asc" ? " ▲" : " ▼") : "";
  const thMoyenne = `<th style="${thStyle}${isMoyActive?thActive:''}"
    data-synthese-sort-sec="${sectionKey}" data-synthese-sort-col="moyenne">
    Moyenne${moyArrow}
  </th>`;

  return `
  <div class="ops-card" style="margin-bottom:22px;">
    <div class="ops-head"><h3 class="ops-title display">${section.label}</h3>
      <span style="font-size:11px; color:var(--ink-soft);">Cliquez sur un en-tête de colonne pour trier</span>
    </div>
    <div style="overflow-x:auto;">
      <table style="width:100%; border-collapse:collapse;">
        <thead>
          <tr style="background:var(--cream-deep);">
            <th style="text-align:left; padding:8px 14px;">Catégorie</th>
            ${headerCells}
            ${thMoyenne}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>${totalRow}</tfoot>
      </table>
    </div>
  </div>`;
}

function attachSyntheseEvents(){
  const anneeSelect = document.getElementById("syntheseAnneeSelect");
  if(anneeSelect){
    anneeSelect.addEventListener("change", (e) => {
      syntheseAnneeActive = e.target.value;
      render();
    });
  }
  document.querySelectorAll("[data-synthese-section]").forEach(chip => {
    chip.addEventListener("click", (e) => {
      syntheseSectionActive = e.currentTarget.dataset.syntheseSection;
      render();
    });
  });
  // Tri des tableaux de synthèse
  document.querySelectorAll("[data-synthese-sort-sec]").forEach(th => {
    th.addEventListener("click", () => {
      const sec = th.dataset.syntheseSortSec;
      const col = th.dataset.syntheseSortCol;
      const colParsed = col === "moyenne" ? "moyenne" : parseInt(col);
      if(!syntheseSort[sec]) syntheseSort[sec] = { col: null, dir: "desc" };
      if(syntheseSort[sec].col === colParsed){
        syntheseSort[sec].dir = syntheseSort[sec].dir === "asc" ? "desc" : "asc";
      } else {
        syntheseSort[sec].col = colParsed;
        syntheseSort[sec].dir = "desc";
      }
      render();
    });
  });
}

function drawSyntheseChart(){
  const canvas = document.getElementById("chartSynthese");
  if(!canvas) return;
  if(syntheseChartInstance) syntheseChartInstance.destroy();

  const moisRevolus = moisRevolusCompletsPourAnnee(syntheseAnneeActive);
  if(moisRevolus.length === 0) return;

  const sec = CATEGORIES[syntheseSectionActive];
  const labels = moisRevolus.map(m => moisLabel(m));
  const totaux = moisRevolus.map(m => totalSection(m, syntheseSectionActive));
  const moyenne = totaux.reduce((s,v)=>s+v,0) / totaux.length;

  syntheseChartInstance = new Chart(canvas, {
    type: "bar",
    data: {
      labels,
      datasets: [
        {
          label: sec.label,
          data: totaux,
          backgroundColor: SECTION_COLORS[syntheseSectionActive] || "#C97B4A",
          borderRadius: 6,
          maxBarThickness: 46
        },
        {
          label: "Moyenne mensuelle",
          data: labels.map(() => moyenne),
          type: "line",
          borderColor: "#2C3E35",
          borderDash: [6,4],
          borderWidth: 2,
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      plugins: {
        legend: { position: "bottom", labels: { font: { family:"Inter", size: 12 }, padding: 14 } },
        tooltip: { callbacks: { label: (ctx) => " " + ctx.dataset.label + ": " + fmtEUR(ctx.parsed.y) } }
      },
      scales: {
        y: { ticks: { callback: (v) => fmtEUR(v), font: { family:"Inter", size: 11 } }, grid: { color:"#EFEAE0" } },
        x: { ticks: { font: { family:"Inter", size: 11.5 } }, grid: { display:false } }
      }
    }
  });
}

  loadState();

  // Lance la synchronisation initiale (pull depuis le Sheet si configuré)
  await initSync();
