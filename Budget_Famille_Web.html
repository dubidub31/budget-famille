<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Famille</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,450;9..144,560;9..144,650&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream: #FBF8F3;
  --cream-deep: #F3EEE3;
  --ink: #2C3E35;
  --ink-soft: #5A6B61;
  --line: #E3DDCD;
  --card: #FFFFFF;
  --terracotta: #C97B4A;
  --terracotta-soft: #F2DDCB;
  --prune: #8B5A6B;
  --prune-soft: #EEDCE2;
  --ambre: #C99A3A;
  --ambre-soft: #F3E6C4;
  --sapin: #3F6B57;
  --sapin-soft: #DCE9E1;
  --rouge: #B5524A;
  --shadow: 0 1px 2px rgba(44,62,53,0.04), 0 8px 24px -8px rgba(44,62,53,0.10);
  --radius-lg: 22px;
  --radius-md: 14px;
  --radius-sm: 9px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}

.display{font-family:'Fraunces',serif;}

/* ---------- Top bar ---------- */
.topbar{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:4px 6px;
  padding:8px 16px;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  background:rgba(251,248,243,0.96);
  backdrop-filter:blur(6px);
  z-index:40;
}
.topbar-group{
  display:flex;
  align-items:center;
  gap:4px;
  flex-shrink:0;
}
.topbar-group--right{
  margin-left:auto;
}
.topbar-sep{
  width:1px;
  height:20px;
  background:var(--line);
  flex-shrink:0;
  margin:0 2px;
}
.topbar-section-label{
  font-family:'Fraunces',serif;
  font-size:16px;
  font-weight:600;
  color:var(--ink);
  margin-right:4px;
}
.mois-select{
  font-family:'Fraunces',serif;
  font-size:15px;
  font-weight:600;
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  padding:5px 10px;
  background:var(--cream);
  color:var(--ink);
  cursor:pointer;
}
.btn{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:13.5px;
  border:none;
  border-radius:999px;
  padding:10px 18px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:7px;
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--ink); color:var(--cream);}
.btn-primary:hover{background:#23332c;}
.btn-secondary{background:var(--card); color:var(--ink); border:1px solid var(--line);}
.btn-secondary:hover{background:var(--cream-deep);}
.btn-ghost{background:transparent;color:var(--ink-soft);}
.btn-ghost:hover{background:var(--cream-deep); color:var(--ink);}
.btn-sm{padding:7px 13px;font-size:12.5px;}
.topbar-actions{display:flex;gap:10px;align-items:center;}

/* ---------- Layout ---------- */
.shell{max-width:1180px;margin:0 auto;padding:32px 36px 80px;}

.hero{
  display:grid;
  grid-template-columns:1.1fr 1fr;
  gap:28px;
  margin-bottom:34px;
}
@media (max-width:880px){.hero{grid-template-columns:1fr;}}

.solde-card{
  background:linear-gradient(155deg, var(--ink) 0%, #233830 100%);
  border-radius:var(--radius-lg);
  padding:34px 34px 30px;
  color:var(--cream);
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:220px;
}
.solde-card::before{
  content:"";
  position:absolute;
  right:-60px;
  top:-60px;
  width:240px;
  height:240px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(201,123,74,0.18), transparent 70%);
}
.solde-label{
  font-size:12.5px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#B9C9BF;
  font-weight:600;
}
.solde-value{
  font-family:'Fraunces',serif;
  font-weight:450;
  font-size:58px;
  line-height:1;
  margin:10px 0 4px;
  letter-spacing:-0.01em;
}
.solde-value.negative{color:#E3AA9E;}
.solde-sub{font-size:13.5px;color:#A9BBB0;}
.solde-progress-row{
  display:flex;
  gap:18px;
  margin-top:22px;
}
.mini-stat{flex:1;}
.mini-stat-label{font-size:11.5px;color:#9FB3A7;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.mini-stat-value{font-family:'Fraunces',serif;font-size:19px;margin-top:3px;}

.status-card{
  background:var(--card);
  border-radius:var(--radius-lg);
  padding:28px 30px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.status-title{
  font-family:'Fraunces',serif;
  font-size:19px;
  font-weight:560;
  margin:0 0 4px;
}
.status-sub{font-size:13px;color:var(--ink-soft); margin-bottom:18px;}
.progress-track{
  height:10px;
  background:var(--cream-deep);
  border-radius:99px;
  overflow:hidden;
  margin-bottom:8px;
}
.progress-fill{
  height:100%;
  background:var(--terracotta);
  border-radius:99px;
  transition:width .4s ease;
}
.progress-caption{font-size:12.5px;color:var(--ink-soft);}
.status-cta{margin-top:18px;}

/* ---------- Section cards (categories) ---------- */
.sections-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:22px;
  margin-bottom:34px;
}
@media (max-width:880px){.sections-grid{grid-template-columns:1fr;}}

.section-card{
  background:var(--card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.section-head{
  padding:18px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.section-head .tag{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-weight:700;
  padding:5px 11px;
  border-radius:99px;
}
.section-revenus .section-head{background:var(--sapin-soft);}
.section-revenus .tag{background:var(--sapin); color:#fff;}
.section-fixes .section-head{background:var(--prune-soft);}
.section-fixes .tag{background:var(--prune); color:#fff;}
.section-variables .section-head{background:var(--terracotta-soft);}
.section-variables .tag{background:var(--terracotta); color:#fff;}
.section-epargne .section-head{background:var(--ambre-soft);}
.section-epargne .tag{background:var(--ambre); color:#fff;}

.section-totals{display:flex; gap:22px; align-items:baseline;}
.section-total-real{font-family:'Fraunces',serif; font-size:22px;}
.section-total-prev{font-size:12.5px; color:var(--ink-soft);}

.cat-list{padding:6px 10px 14px;}
.cat-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:10px;
  align-items:center;
  padding:9px 14px;
  border-radius:var(--radius-sm);
}
.cat-row:hover{background:var(--cream-deep);}
.cat-name{font-size:13.5px; color:var(--ink);}
.cat-prev-input{
  width:78px;
  text-align:right;
  border:1px solid var(--line);
  border-radius:7px;
  padding:5px 7px;
  font-family:'Inter',sans-serif;
  font-size:12.5px;
  color:var(--ink-soft);
  background:var(--cream);
}
.cat-prev-input:focus{outline:2px solid var(--terracotta); outline-offset:1px;}
.cat-real{
  width:78px;
  text-align:right;
  font-size:13px;
  font-weight:600;
  color:var(--ink);
}
.cat-real.zero{color:var(--ink-soft); font-weight:400;}

/* ---------- Charts row ---------- */
.charts-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  margin-bottom:34px;
}
@media (max-width:880px){.charts-grid{grid-template-columns:1fr;}}
.chart-card{
  background:var(--card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:24px 26px 18px;
}
.chart-title{
  font-family:'Fraunces',serif;
  font-size:17px;
  font-weight:560;
  margin:0 0 16px;
}

/* ---------- Operations table ---------- */
.ops-card{
  background:var(--card);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:6px 0 16px;
}
.ops-head{
  padding:22px 26px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:12px;
}
.ops-title{font-family:'Fraunces',serif; font-size:19px; font-weight:560; margin:0;}
.ops-filters{display:flex; gap:8px;}
.chip{
  font-size:12px;
  font-weight:600;
  padding:6px 13px;
  border-radius:99px;
  background:var(--cream-deep);
  color:var(--ink-soft);
  cursor:pointer;
  border:1px solid transparent;
}
.chip.active{background:var(--ink); color:var(--cream);}

table.ops-table{width:100%; border-collapse:collapse; table-layout:fixed;}
table.ops-table th{
  text-align:left;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--ink-soft);
  font-weight:600;
  padding:8px 10px;
  border-bottom:1px solid var(--line);
}
table.ops-table td{
  padding:11px 10px;
  font-size:13.5px;
  border-bottom:1px solid var(--cream-deep);
  overflow:hidden;
}
table.ops-table tr:last-child td{border-bottom:none;}

/* Largeurs fixes des colonnes */
table.ops-table th:nth-child(1), table.ops-table td:nth-child(1){ width:40px; padding-left:14px !important; }
table.ops-table th:nth-child(2), table.ops-table td:nth-child(2){ width:90px; }   /* Date */
table.ops-table th:nth-child(3), table.ops-table td:nth-child(3){ width:22%; }    /* Libellé */
table.ops-table th:nth-child(4), table.ops-table td:nth-child(4){ width:80px; }   /* Carte */
table.ops-table th:nth-child(5), table.ops-table td:nth-child(5){ width:13%; }    /* Sous-cat */
table.ops-table th:nth-child(6), table.ops-table td:nth-child(6){ width:90px; text-align:right; } /* Montant */
table.ops-table th:nth-child(7), table.ops-table td:nth-child(7){ width:16%; }    /* Catégorie */
table.ops-table th:nth-child(8), table.ops-table td:nth-child(8){ width:auto; min-width:120px; } /* Commentaire */

.amount-cell{text-align:right; font-weight:600; font-variant-numeric:tabular-nums;}
.amount-cell.credit{color:var(--sapin);}
.amount-cell.debit{color:var(--ink);}
.cat-pill{
  font-size:11.5px;
  padding:4px 10px;
  border-radius:99px;
  background:var(--cream-deep);
  color:var(--ink-soft);
  display:inline-block;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  vertical-align:middle;
}
.cat-pill.empty{
  background:var(--terracotta-soft);
  color:var(--terracotta);
  font-weight:600;
  cursor:pointer;
}
.row-classify-btn{
  font-size:12px;
  font-weight:600;
  color:var(--terracotta);
  cursor:pointer;
  background:none;
  border:none;
  padding:4px 8px;
}

.empty-state{
  padding:50px 30px;
  text-align:center;
  color:var(--ink-soft);
}
.empty-state .display{font-size:20px; color:var(--ink); margin-bottom:6px;}

/* ---------- Modal: classification popup ---------- */
.modal-overlay{
  position:fixed; inset:0;
  background:rgba(44,62,53,0.55);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
  padding:24px;
}
.modal-overlay.open{display:flex;}
.modal-card{
  background:var(--cream);
  border-radius:26px;
  width:100%;
  max-width:640px;
  max-height:88vh;
  display:flex;
  flex-direction:column;
  box-shadow:0 30px 60px -20px rgba(0,0,0,0.35);
  overflow:hidden;
}
.modal-head{
  padding:22px 28px 18px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
}
.modal-progress{font-size:11.5px; color:var(--ink-soft); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}
.modal-op-libelle{font-family:'Fraunces',serif; font-size:21px; font-weight:560; margin:6px 0 2px;}
.modal-op-detail{font-size:12.5px; color:var(--ink-soft);}
.modal-op-amount{
  font-family:'Fraunces',serif;
  font-size:30px;
  text-align:right;
  white-space:nowrap;
}
.modal-op-amount.credit{color:var(--sapin);}
.modal-op-amount.debit{color:var(--ink);}
.modal-close{
  background:none; border:none; cursor:pointer;
  color:var(--ink-soft); font-size:20px;
  position:absolute; top:18px; right:22px;
}

.modal-body{padding:18px 28px 8px; overflow-y:auto; flex:1;}
.cat-section-title{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-weight:700;
  margin:18px 0 8px;
  padding-left:2px;
}
.cat-section-title:first-child{margin-top:0;}
.cat-section-title.t-revenus{color:var(--sapin);}
.cat-section-title.t-fixes{color:var(--prune);}
.cat-section-title.t-variables{color:var(--terracotta);}
.cat-section-title.t-epargne{color:var(--ambre);}

.cat-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-bottom:6px;
}
.cat-stamp{
  border:1.5px solid var(--line);
  background:var(--card);
  border-radius:var(--radius-sm);
  padding:10px 13px;
  font-size:13px;
  text-align:left;
  cursor:pointer;
  transition:all .12s ease;
  color:var(--ink);
  line-height:1.25;
}
.cat-stamp:hover{border-color:var(--terracotta); background:var(--terracotta-soft); transform:scale(1.01);}
.cat-stamp.t-revenus:hover{border-color:var(--sapin); background:var(--sapin-soft);}
.cat-stamp.t-fixes:hover{border-color:var(--prune); background:var(--prune-soft);}
.cat-stamp.t-epargne:hover{border-color:var(--ambre); background:var(--ambre-soft);}

.modal-foot{
  padding:16px 28px 22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-top:1px solid var(--line);
}

/* ---------- Toast ---------- */
.toast{
  position:fixed;
  bottom:26px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--ink);
  color:var(--cream);
  padding:13px 22px;
  border-radius:99px;
  font-size:13.5px;
  font-weight:500;
  box-shadow:0 12px 30px -10px rgba(0,0,0,0.4);
  opacity:0;
  transition:all .25s ease;
  z-index:200;
  pointer-events:none;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---------- New month modal ---------- */
.simple-modal-card{
  background:var(--cream);
  border-radius:22px;
  width:100%;
  max-width:420px;
  padding:28px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,0.35);
}
.simple-modal-card h3{font-family:'Fraunces',serif; font-size:20px; margin:0 0 6px;}
.simple-modal-card p{font-size:13.5px; color:var(--ink-soft); margin:0 0 18px;}
.simple-modal-card select, .simple-modal-card input{
  width:100%;
  padding:10px 13px;
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  font-family:'Inter',sans-serif;
  font-size:14px;
  margin-bottom:14px;
  background:var(--card);
}
.simple-modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:6px;}

/* ---------- Solde compte début/fin ---------- */
.solde-compte-row{
  display:flex;
  gap:14px;
  margin:18px 0 4px;
}
.solde-compte-field{flex:1;}
.solde-compte-field label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--ink-soft);
  font-weight:600;
  display:block;
  margin-bottom:5px;
}
.solde-compte-field input{
  width:100%;
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  padding:8px 10px;
  font-family:'Inter',sans-serif;
  font-size:13.5px;
  background:var(--cream);
  color:var(--ink);
}
.solde-compte-field input:focus{outline:2px solid var(--terracotta); outline-offset:1px;}
.manual-tag{
  font-size:9.5px;
  background:var(--ambre-soft);
  color:var(--ambre);
  padding:1px 6px;
  border-radius:99px;
  text-transform:none;
  letter-spacing:0;
  margin-left:5px;
  font-weight:700;
}

/* ---------- Ops table: tri & filtres ---------- */
.ops-table-scroll{overflow-x:auto;}
table.ops-table th{position:relative; white-space:nowrap; user-select:none;}
.th-sort{cursor:pointer;}
.th-sort:hover{color:var(--ink);}
.th-filter-btn{
  cursor:pointer;
  margin-left:5px;
  color:var(--ink-soft);
  font-size:10px;
  position:relative;
}
.th-filter-btn.active{color:var(--terracotta); font-weight:700;}
.filter-dot{
  display:inline-block;
  width:6px; height:6px;
  border-radius:50%;
  background:var(--terracotta);
  margin-left:3px;
  vertical-align:middle;
}
.filter-menu{
  position:absolute;
  top:100%;
  left:0;
  margin-top:4px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  box-shadow:0 14px 30px -10px rgba(0,0,0,0.18);
  max-height:260px;
  overflow-y:auto;
  z-index:50;
  min-width:200px;
  text-transform:none;
  letter-spacing:0;
  font-weight:400;
}
.filter-menu-item{
  padding:8px 14px;
  font-size:12.5px;
  color:var(--ink);
  cursor:pointer;
  white-space:nowrap;
}
.filter-menu-item:hover{background:var(--cream-deep);}
.filter-menu-item.active{background:var(--terracotta-soft); color:var(--terracotta); font-weight:600;}
.filter-menu-clear{border-bottom:1px solid var(--line); font-style:italic; color:var(--ink-soft);}

.ops-subtotal-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 26px;
  background:var(--cream-deep);
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.ops-subtotal-label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.04em;
  font-weight:600;
  color:var(--ink-soft);
}
.ops-subtotal-value{font-size:19px;}
.ops-subtotal-value.credit{color:var(--sapin);}
.ops-subtotal-value.debit{color:var(--ink);}

.dropdown-wrap{position:relative; display:inline-block;}
.dropdown-menu{
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  box-shadow:0 16px 34px -12px rgba(0,0,0,0.22);
  min-width:300px;
  z-index:60;
  overflow:hidden;
}
.dropdown-item{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:2px;
  width:100%;
  padding:11px 16px;
  background:none;
  border:none;
  border-bottom:1px solid var(--line);
  cursor:pointer;
  text-align:left;
  font-family:'Inter',sans-serif;
}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:var(--cream-deep);}
.dropdown-item-title{font-size:13px; font-weight:600; color:var(--ink);}
.dropdown-item-sub{font-size:11.5px; color:var(--ink-soft); line-height:1.35;}

.muted{color:var(--ink-soft); opacity:.6;}

/* ---------- Cellule catégorie avec reset ---------- */
.cat-pill-wrap{display:inline-flex; align-items:center; gap:5px;}
.cat-pill.assigned{cursor:pointer;}
.cat-pill.assigned:hover{background:var(--cream-deep);}
.cat-reset-btn{
  background:none;
  border:none;
  color:var(--ink-soft);
  cursor:pointer;
  font-size:11px;
  padding:2px 4px;
  border-radius:50%;
  line-height:1;
}
.cat-reset-btn:hover{background:var(--prune-soft); color:var(--prune);}

.inline-cat-select{
  font-family:'Inter',sans-serif;
  font-size:12.5px;
  padding:6px 8px;
  border:1.5px solid var(--terracotta);
  border-radius:7px;
  background:var(--card);
  color:var(--ink);
  max-width:260px;
}

/* ---------- Drill-down chart breadcrumb ---------- */

// ===== sync.js =====
// =========================================================
// SYNC.JS — Synchronisation automatique vers Google Sheets
// =========================================================
// Ce module ajoute une couche de sync au-dessus du localStorage.
// localStorage reste la mémoire immédiate (réactivité inchangée).
// Google Sheets est la source de vérité partagée entre les deux utilisateurs.
//
// Stratégie :
//  - PULL automatique au chargement de la page (tire la dernière version du Sheet)
//  - PUSH automatique debouncé (attend 1.5s d'inactivité avant d'envoyer)
//  - En cas d'erreur réseau, on continue en local (pas de blocage)
//  - Un indicateur visuel discret en topbar montre l'état de la sync

// ---- Configuration (à renseigner avant d'utiliser l'app) ----
const SYNC_CONFIG = {
  apiUrl: "https://script.google.com/macros/s/AKfycbzFeCI6hrqxaKiXvQqsIkuoJszYFoEsB0XQHZU6tjunkFzhacikhinA6CPk1BEkkcBF/exec",
  secret: "",          // À remplir par l'utilisateur dans la page de config
  userName: "",        // Prénom de l'utilisateur courant (ex. "Cedric" ou "Votre femme")
  enabled: false       // Activé seulement si secret + userName sont renseignés
};

// ---- État de la synchronisation ----
let syncState = {
  status: "idle",      // idle | syncing | ok | error | disabled
  lastPush: null,      // timestamp ISO du dernier push réussi
  lastPull: null,      // timestamp ISO du dernier pull réussi
  lastUpdatedBy: null, // qui a fait le dernier push
  debounceTimer: null, // timer du debounce
  pendingPush: false   // un push est en attente
};

// ---- Debounce : déclenche un push 1.5s après la dernière modification ----
function schedulePush(){
  if(!SYNC_CONFIG.enabled) return;
  if(syncState.status === "syncing") return; // ne pas empiler les pushs
  syncState.pendingPush = true;
  clearTimeout(syncState.debounceTimer);
  syncState.debounceTimer = setTimeout(() => {
    pushToSheets();
  }, 1500);
  updateSyncIndicator();
}

// ---- PUSH : envoie STATE entier vers le Sheet ----
async function pushToSheets(){
  if(!SYNC_CONFIG.enabled) return;
  syncState.status = "syncing";
  syncState.pendingPush = false;
  updateSyncIndicator();

  try {
    const stateToSend = {
      ...STATE,
      __updatedBy: SYNC_CONFIG.userName,
      __pushedAt: new Date().toISOString()
    };

    // On utilise application/x-www-form-urlencoded (pas de preflight CORS)
    // plutôt que application/json qui déclencherait un OPTIONS bloqué par Apps Script
    const body = new URLSearchParams({
      action: "push",
      secret: SYNC_CONFIG.secret,
      updatedBy: SYNC_CONFIG.userName,
      stateJson: JSON.stringify(stateToSend)
    });

    const response = await fetch(SYNC_CONFIG.apiUrl, {
      method: "POST",
      body: body,
      redirect: "follow"
    });

    const text = await response.text();
    let data;
    try { data = JSON.parse(text); }
    catch(e) { throw new Error("Réponse non-JSON : " + text.slice(0, 100)); }

    if(data.ok){
      syncState.status = "ok";
      syncState.lastPush = data.timestamp;
    } else {
      console.error("Sync push échoué :", data.error);
      syncState.status = "error";
    }
  } catch(err){
    console.error("Sync push erreur réseau :", err);
    syncState.status = "error";
  }
  updateSyncIndicator();
}

// ---- PULL : récupère la dernière version depuis le Sheet ----
async function pullFromSheets(silent){
  if(!SYNC_CONFIG.enabled) return null;
  if(!silent){
    syncState.status = "syncing";
    updateSyncIndicator();
  }

  try {
    const url = `${SYNC_CONFIG.apiUrl}?action=pull&secret=${encodeURIComponent(SYNC_CONFIG.secret)}`;
    const response = await fetch(url, { redirect: "follow" });
    const data = await response.json();

    if(!data.ok){
      console.error("Sync pull échoué :", data.error);
      syncState.status = "error";
      updateSyncIndicator();
      return null;
    }

    syncState.lastPull = new Date().toISOString();
    syncState.lastUpdatedBy = data.updatedBy;

    if(!silent){
      syncState.status = "ok";
      updateSyncIndicator();
    }

    return data.state; // peut être null si aucune donnée encore

  } catch(err){
    console.error("Sync pull erreur réseau :", err);
    syncState.status = "error";
    updateSyncIndicator();
    return null;
  }
}

// ---- Chargement initial : tire depuis le Sheet, fusionne avec le local ----
async function initSync(){
  const configOk = loadSyncConfig();
  if(!configOk){
    syncState.status = "disabled";
    updateSyncIndicator();
    return;
  }

  syncState.status = "syncing";
  updateSyncIndicator();

  const remoteState = await pullFromSheets(true);

  if(remoteState){
    // Compare les horodatages pour savoir quelle version est la plus récente
    const remoteTs = remoteState.__pushedAt ? new Date(remoteState.__pushedAt) : new Date(0);
    const localTs  = STATE.__pushedAt      ? new Date(STATE.__pushedAt)       : new Date(0);

    if(remoteTs > localTs){
      // La version distante est plus récente : on l'adopte
      Object.assign(STATE, remoteState);
      // Nettoyage des champs internes de sync avant de les utiliser comme STATE
      delete STATE.__updatedBy;
      delete STATE.__pushedAt;
      saveState(); // met à jour le localStorage local
      render();
      showToast(`Données synchronisées depuis le cloud (${syncState.lastUpdatedBy || "dernier auteur"}).`);
    } else if(localTs > remoteTs){
      // La version locale est plus récente (push en attente qui avait échoué ?)
      // On repousse immédiatement pour remettre le Sheet à jour
      await pushToSheets();
      showToast("Données locales plus récentes : synchronisation vers le cloud.");
    }
    // Si égales (ou remoteTs === epoch), pas d'action nécessaire
  }

  syncState.status = "ok";
  updateSyncIndicator();
}

// ---- Indicateur visuel dans la topbar ----
function updateSyncIndicator(){
  const el = document.getElementById("syncIndicator");
  if(!el) return;

  const icons = {
    idle:     "☁",
    syncing:  "↻",
    ok:       "✓",
    error:    "⚠",
    disabled: "—"
  };
  const labels = {
    idle:     "Sync en attente…",
    syncing:  "Synchronisation…",
    ok:       syncState.lastPush
                ? "Synchronisé " + fmtTimeAgo(syncState.lastPush)
                : "Synchronisé",
    error:    "Erreur de sync",
    disabled: "Sync désactivée"
  };
  const colors = {
    idle:     "var(--ink-soft)",
    syncing:  "var(--ambre)",
    ok:       "var(--sapin)",
    error:    "var(--rouge)",
    disabled: "var(--ink-soft)"
  };

  const s = syncState.status;
  el.innerHTML = `<span style="color:${colors[s]}">${icons[s]}</span> <span style="color:${colors[s]};font-size:11px;">${labels[s]}</span>`;

  // Animer l'icône de rotation pendant la sync
  if(s === "syncing"){
    el.querySelector("span").style.display = "inline-block";
    el.querySelector("span").style.animation = "spin 1s linear infinite";
  }
}

function fmtTimeAgo(isoTs){
  const diff = Math.round((Date.now() - new Date(isoTs)) / 1000);
  if(diff < 5)   return "à l'instant";
  if(diff < 60)  return `il y a ${diff}s`;
  if(diff < 3600) return `il y a ${Math.round(diff/60)}min`;
  return `il y a ${Math.round(diff/3600)}h`;
}

// ---- Rafraîchir le libellé "il y a Xmin" toutes les 30 secondes ----
setInterval(() => {
  if(syncState.status === "ok") updateSyncIndicator();
}, 30000);

// ---- Forcer un pull manuel (bouton dans l'UI) ----
async function forcePull(){
  syncState.status = "syncing";
  updateSyncIndicator();
  const remoteState = await pullFromSheets(false);
  if(remoteState){
    const remoteTs = remoteState.__pushedAt ? new Date(remoteState.__pushedAt) : new Date(0);
    const localTs  = STATE.__pushedAt       ? new Date(STATE.__pushedAt)       : new Date(0);

    if(remoteTs <= localTs){
      showToast("Vos données locales sont déjà à jour.");
      syncState.status = "ok";
      updateSyncIndicator();
      return;
    }

    const confirmMsg = syncState.lastUpdatedBy && syncState.lastUpdatedBy !== SYNC_CONFIG.userName
      ? `${syncState.lastUpdatedBy} a modifié les données. Écraser vos données locales avec la version du cloud ?`
      : "Écraser vos données locales avec la version du cloud ?";

    if(!confirm(confirmMsg)) {
      syncState.status = "ok";
      updateSyncIndicator();
      return;
    }

    Object.assign(STATE, remoteState);
    delete STATE.__updatedBy;
    delete STATE.__pushedAt;
    saveState();
    render();
    showToast("Données rechargées depuis le cloud.");
  }
  syncState.status = "ok";
  updateSyncIndicator();
}

// ---- Config : chargement / sauvegarde depuis localStorage ----
const SYNC_CONFIG_KEY = "budget_famille_sync_config";

function loadSyncConfig(){
  try {
    const saved = localStorage.getItem(SYNC_CONFIG_KEY);
    if(saved){
      const cfg = JSON.parse(saved);
      if(cfg.secret && cfg.userName){
        SYNC_CONFIG.secret   = cfg.secret;
        SYNC_CONFIG.userName = cfg.userName;
        SYNC_CONFIG.enabled  = true;
        return true;
      }
    }
  } catch(e){}
  SYNC_CONFIG.enabled = false;
  return false;
}

function saveSyncConfig(secret, userName){
  SYNC_CONFIG.secret   = secret;
  SYNC_CONFIG.userName = userName;
  SYNC_CONFIG.enabled  = !!(secret && userName);
  localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify({ secret, userName }));
}

// ---- Modale de configuration de la sync ----
function ouvrirConfigSync(){
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay open";
  overlay.id = "syncConfigOverlay";

  const secretActuel = SYNC_CONFIG.secret || "";
  const userActuel   = SYNC_CONFIG.userName || "";

  overlay.innerHTML = `
    <div class="simple-modal-card" style="max-width:480px;">
      <h3 class="display">Configuration de la synchronisation</h3>
      <p style="font-size:13px; color:var(--ink-soft); margin-bottom:20px;">
        Renseignez le secret partagé et votre prénom pour activer la synchronisation automatique
        avec Google Sheets. Ces informations sont stockées localement sur cet ordinateur.
      </p>
      <div style="display:flex; flex-direction:column; gap:14px;">
        <div>
          <label style="font-size:11px; text-transform:uppercase; letter-spacing:.04em; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:5px;">
            Secret partagé
          </label>
          <input type="password" id="syncSecretInput" value="${escapeAttr(secretActuel)}"
            placeholder="Le mot de passe configuré dans le script"
            style="width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 12px; font-size:13.5px; background:var(--cream); box-sizing:border-box;">
        </div>
        <div>
          <label style="font-size:11px; text-transform:uppercase; letter-spacing:.04em; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:5px;">
            Votre prénom
          </label>
          <input type="text" id="syncUserInput" value="${escapeAttr(userActuel)}"
            placeholder="ex. Cedric ou Votre femme"
            style="width:100%; border:1px solid var(--line); border-radius:8px; padding:9px 12px; font-size:13.5px; background:var(--cream); box-sizing:border-box;">
        </div>
      </div>
      <div style="margin-top:8px; font-size:12px; color:var(--ink-soft);">
        L'URL de l'API est déjà configurée dans l'application.
      </div>
      <div class="simple-modal-actions" style="margin-top:22px;">
        <button class="btn btn-ghost" id="cancelSyncConfig">Annuler</button>
        ${SYNC_CONFIG.enabled
          ? `<button class="btn btn-ghost" id="disableSyncBtn" style="color:var(--rouge);">Désactiver la sync</button>`
          : ""}
        <button class="btn btn-primary" id="saveSyncConfig">Activer la synchronisation</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  overlay.addEventListener("click", (e) => { if(e.target === overlay) overlay.remove(); });
  overlay.querySelector("#cancelSyncConfig").addEventListener("click", () => overlay.remove());

  const disableBtn = overlay.querySelector("#disableSyncBtn");
  if(disableBtn){
    disableBtn.addEventListener("click", () => {
      saveSyncConfig("", "");
      syncState.status = "disabled";
      overlay.remove();
      updateSyncIndicator();
      showToast("Synchronisation désactivée.");
    });
  }

  overlay.querySelector("#saveSyncConfig").addEventListener("click", async () => {
    const secret   = overlay.querySelector("#syncSecretInput").value.trim();
    const userName = overlay.querySelector("#syncUserInput").value.trim();
    if(!secret || !userName){
      alert("Veuillez renseigner les deux champs.");
      return;
    }
    saveSyncConfig(secret, userName);
    overlay.remove();
    showToast("Configuration sauvegardée. Test de connexion en cours…");
    await initSync();
  });
}

// STATE MANAGEMENT

const STORAGE_KEY = "budget_famille_v1";

function defaultPrevisionnel(){
  const prev = {};
  for(const key in CATEGORIES){
    CATEGORIES[key].items.forEach(cat => { prev[cat] = 0; });
  }
  return prev;
}

function defaultState(){
  const moisKey = "2026-05";
  return {
    moisActif: moisKey,
    moisListe: [moisKey],
    operations: {
      [moisKey]: OPERATIONS_MAI_2026.map(o => ({...o}))
    },
    previsionnel: {
      [moisKey]: defaultPrevisionnel()
    },
    soldeCompte: {
      [moisKey]: { debut: null }
    },
    notes: {},          // moisKey -> texte libre
    commentaires: {},   // opId -> texte libre
    regles: {}
  };
}

let STATE = null;

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      STATE = JSON.parse(raw);
      return;
    }
  }catch(e){
    console.warn("Impossible de lire le stockage local, démarrage avec des données par défaut.", e);
  }
  STATE = defaultState();
  saveState();
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
    // Déclenche un push vers Google Sheets (debouncé, 1.5s d'inactivité)
    if(typeof schedulePush === "function") schedulePush();
  }catch(e){
    console.error("Erreur de sauvegarde locale", e);
    showToast("Erreur lors de la sauvegarde locale. Exportez vos données pour ne rien perdre.");
  }
}

function currentOps(){
  return STATE.operations[STATE.moisActif] || [];
}

function currentPrevisionnel(){
  return STATE.previsionnel[STATE.moisActif] || defaultPrevisionnel();
}

function realParCategorie(moisKey){
  const ops = STATE.operations[moisKey] || [];
  const totals = {};
  for(const key in CATEGORIES){
    CATEGORIES[key].items.forEach(cat => { totals[cat] = 0; });
  }
  ops.forEach(op => {
    if(op.categorie && totals.hasOwnProperty(op.categorie)){
      totals[op.categorie] += Math.abs(op.montant);
    }
  });
  return totals;
}

function totalSection(moisKey, sectionKey){
  const reals = realParCategorie(moisKey);
  return CATEGORIES[sectionKey].items.reduce((sum, cat) => sum + (reals[cat] || 0), 0);
}

function totalSectionPrevisionnel(moisKey, sectionKey){
  const prev = STATE.previsionnel[moisKey] || defaultPrevisionnel();
  return CATEGORIES[sectionKey].items.reduce((sum, cat) => sum + (Number(prev[cat]) || 0), 0);
}

function soldeDuMois(moisKey){
  const revenus = totalSection(moisKey, "revenus");
  const fixes = totalSection(moisKey, "fixes");
  const variables = totalSection(moisKey, "variables");
  const epargne = totalSection(moisKey, "epargne");
  return revenus - fixes - variables - epargne;
}

function soldeDuMoisPrevisionnel(moisKey){
  const revenus = totalSectionPrevisionnel(moisKey, "revenus");
  const fixes = totalSectionPrevisionnel(moisKey, "fixes");
  const variables = totalSectionPrevisionnel(moisKey, "variables");
  const epargne = totalSectionPrevisionnel(moisKey, "epargne");
  return revenus - fixes - variables - epargne;
}

function nbOperationsClassees(moisKey){
  const ops = STATE.operations[moisKey] || [];
  return ops.filter(o => o.categorie).length;
}

// ---------- Solde de compte (début / fin de mois) ----------
function getSoldeDebut(moisKey){
  const entry = STATE.soldeCompte && STATE.soldeCompte[moisKey];
  if(entry && entry.debut !== null && entry.debut !== undefined){
    return entry.debut;
  }
  // Reprend automatiquement le solde en cours du mois précédent UNIQUEMENT si ce mois est entièrement classé
  const moisAnterieurs = STATE.moisListe.filter(m => m < moisKey).sort();
  if(moisAnterieurs.length){
    const moisRef = moisAnterieurs[moisAnterieurs.length-1];
    const opsRef = STATE.operations[moisRef] || [];
    const toutesClassees = opsRef.length > 0 && opsRef.every(o => !!o.categorie);
    if(toutesClassees){
      return getSoldeEnCours(moisRef);
    }
  }
  return 0;
}

function getSoldeEnCours(moisKey){
  // Toujours calculé : solde début + flux des opérations classées
  return getSoldeDebut(moisKey) + soldeDuMois(moisKey);
}

function setSoldeDebut(moisKey, valeur){
  if(!STATE.soldeCompte) STATE.soldeCompte = {};
  if(!STATE.soldeCompte[moisKey]) STATE.soldeCompte[moisKey] = { debut: null };
  STATE.soldeCompte[moisKey].debut = valeur;
  saveState();
}

function resetSoldeDebutManuel(moisKey){
  if(STATE.soldeCompte && STATE.soldeCompte[moisKey]){
    STATE.soldeCompte[moisKey].debut = null;
  }
  saveState();
}

function creerNouveauMois(moisKey){
  if(STATE.moisListe.includes(moisKey)) return false;
  STATE.moisListe.push(moisKey);
  STATE.moisListe.sort();
  STATE.operations[moisKey] = [];
  // Reconduction du prévisionnel du mois précédent (le plus récent avant ce mois)
  const moisAnterieurs = STATE.moisListe.filter(m => m < moisKey);
  const moisRef = moisAnterieurs.length ? moisAnterieurs[moisAnterieurs.length-1] : null;
  STATE.previsionnel[moisKey] = moisRef ? {...STATE.previsionnel[moisRef]} : defaultPrevisionnel();
  STATE.soldeCompte[moisKey] = { debut: null };
  saveState();
  return true;
}

function importerOperations(moisKey, nouvellesOps){
  if(!STATE.operations[moisKey]) STATE.operations[moisKey] = [];
  const existantes = STATE.operations[moisKey];
  const dejaPresentes = new Set(existantes.map(o => o.date+"|"+o.libelle+"|"+o.montant));
  let compteur = existantes.length;
  let ajoutees = 0;
  nouvellesOps.forEach(op => {
    const sig = op.date+"|"+op.libelle+"|"+op.montant;
    if(dejaPresentes.has(sig)) return; // évite les doublons d'import
    compteur++;
    existantes.push({
      id: "op_"+moisKey+"_"+String(compteur).padStart(3,"0"),
      date: op.date,
      libelle: op.libelle,
      libelleOperation: op.libelleOperation || "",
      detail: op.detail || "",
      sousCategorie: op.sousCategorie || "",
      carte: op.carte || null,
      montant: op.montant,
      sens: op.montant >= 0 ? "credit" : "debit",
      categorie: null
    });
    ajoutees++;
  });
  existantes.sort((a,b) => a.date.localeCompare(b.date));
  saveState();
  return ajoutees;
}

// Importe un lot d'opérations potentiellement à cheval sur plusieurs mois.
// Regroupe automatiquement par mois (AAAA-MM extrait de op.date), crée les
// onglets mensuels manquants, et répartit chaque opération dans le bon mois.
// Retourne un résumé : { parMois: { "2026-01": ajoutees, ... }, moisCrees: [...], totalAjoutees }
function importerOperationsMultiMois(nouvellesOps){
  const groupes = {};
  nouvellesOps.forEach(op => {
    const moisKey = (op.date || "").slice(0, 7); // "AAAA-MM"
    if(!moisKey || moisKey.length !== 7) return;
    if(!groupes[moisKey]) groupes[moisKey] = [];
    groupes[moisKey].push(op);
  });

  const moisConcernes = Object.keys(groupes).sort();
  const moisCrees = [];
  const parMois = {};

  moisConcernes.forEach(moisKey => {
    if(!STATE.moisListe.includes(moisKey)){
      creerNouveauMois(moisKey);
      moisCrees.push(moisKey);
    }
    const ajoutees = importerOperations(moisKey, groupes[moisKey]);
    parMois[moisKey] = ajoutees;
  });

  const totalAjoutees = Object.values(parMois).reduce((s,n) => s+n, 0);
  saveState();
  return { parMois, moisCrees, moisConcernes, totalAjoutees };
}

function classerOperation(moisKey, opId, categorie){
  const ops = STATE.operations[moisKey] || [];
  const op = ops.find(o => o.id === opId);
  if(op){
    op.categorie = categorie;
    saveState();
  }
}

function declasserOperation(moisKey, opId){
  const ops = STATE.operations[moisKey] || [];
  const op = ops.find(o => o.id === opId);
  if(op){
    op.categorie = null;
    saveState();
  }
}

function resetClassementMois(moisKey){
  const ops = STATE.operations[moisKey] || [];
  ops.forEach(op => { op.categorie = null; });
  saveState();
}

function reinitialiserMoisComplet(moisKey){
  // Supprime toutes les opérations du mois (à réimporter via CSV)
  STATE.operations[moisKey] = [];
  saveState();
}

// Supprime complètement un mois : opérations, prévisionnel, solde, et retire
// l'onglet de la liste. Si le mois supprimé était actif, bascule sur un autre.
function supprimerMoisCompletement(moisKey){
  if(!STATE.moisListe.includes(moisKey)) return false;

  delete STATE.operations[moisKey];
  delete STATE.previsionnel[moisKey];
  if(STATE.soldeCompte) delete STATE.soldeCompte[moisKey];
  STATE.moisListe = STATE.moisListe.filter(m => m !== moisKey);

  if(STATE.moisActif === moisKey){
    if(STATE.moisListe.length > 0){
      // Bascule sur le mois le plus proche chronologiquement (le précédent si possible)
      const anterieurs = STATE.moisListe.filter(m => m < moisKey);
      STATE.moisActif = anterieurs.length
        ? anterieurs[anterieurs.length - 1]
        : STATE.moisListe[0];
    } else {
      // Plus aucun mois : on en recrée un vide pour le mois en cours
      const nouveauKey = moisKey;
      STATE.moisListe = [nouveauKey];
      STATE.operations[nouveauKey] = [];
      STATE.previsionnel[nouveauKey] = defaultPrevisionnel();
      STATE.soldeCompte[nouveauKey] = { debut: null };
      STATE.moisActif = nouveauKey;
    }
  }

  saveState();
  return true;
}

// Un mois est "révolu et complet" si : ce n'est pas le mois en cours (le plus récent actif)
// ET toutes ses opérations ont une catégorie ET il contient au moins une opération.
function moisEstRevoluEtComplet(moisKey){
  const ops = STATE.operations[moisKey] || [];
  if(ops.length === 0) return false;
  const toutesClassees = ops.every(o => !!o.categorie);
  if(!toutesClassees) return false;
  // "Révolu" = il existe un mois strictement postérieur dans la liste (on a avancé depuis)
  const aUnMoisSuivant = STATE.moisListe.some(m => m > moisKey);
  return aUnMoisSuivant;
}

function moisRevolusComplets(){
  return STATE.moisListe.filter(moisEstRevoluEtComplet).sort();
}

// =========================================================
// MÉMOIRE DES RÈGLES (apprentissage)
// =========================================================
// Structure : STATE.regles = { "LIBELLE_NORMALISE": { categorie, score, derniereVue } }

function normaliserLibelle(libelle){
  return (libelle || "")
    .toUpperCase()
    .replace(/\d{6,}/g, "")      // retire les longues séquences numériques (refs bancaires)
    .replace(/[^A-Z\s]/g, " ")   // garde seulement lettres et espaces
    .replace(/\s+/g, " ")
    .trim()
    .slice(0, 40);               // limite à 40 chars pour la clé
}

function apprentissage(libelle, categorie, montant){
  if(!STATE.regles) STATE.regles = {};
  const cle = normaliserLibelle(libelle);
  if(!cle) return;

  // Vérification de cohérence signe / section
  // Si montant est fourni, on refuse de mémoriser une règle incohérente
  if(montant !== undefined && montant !== null){
    const isCredit = montant >= 0;
    const sec = categorieSection(categorie);
    const sectionValide = isCredit ? sec === "revenus" : sec !== "revenus";
    if(!sectionValide) return; // on ne mémorise pas une règle incohérente
  }

  const existant = STATE.regles[cle];
  if(existant && existant.categorie === categorie){
    existant.score = Math.min((existant.score || 1) + 1, 20);
    existant.derniereVue = Date.now();
  } else {
    STATE.regles[cle] = { categorie, score: 1, derniereVue: Date.now() };
  }
  saveState();
}

function supprimerRegle(libelle){
  if(!STATE.regles) return;
  const cle = normaliserLibelle(libelle);
  delete STATE.regles[cle];
  saveState();
}

function chercherRegle(libelle, montant){
  if(!STATE.regles) return null;
  const cle = normaliserLibelle(libelle);
  if(!cle) return null;

  // Détermine les sections compatibles avec le signe du montant
  const isCredit = montant >= 0;
  const sectionsCompatibles = isCredit ? ["revenus"] : ["fixes","variables","epargne"];

  function regleCompatible(regle){
    if(!regle) return false;
    const sec = categorieSection(regle.categorie);
    return sectionsCompatibles.includes(sec);
  }

  // Correspondance exacte
  if(STATE.regles[cle] && regleCompatible(STATE.regles[cle])) return STATE.regles[cle];

  // Correspondance approximative
  const debut = cle.slice(0, 10);
  if(debut.length < 4) return null;
  let meilleur = null;
  let meilleurScore = 0;
  for(const k in STATE.regles){
    if(k.startsWith(debut)){
      const r = STATE.regles[k];
      if(r.score > meilleurScore && regleCompatible(r)){
        meilleurScore = r.score;
        meilleur = r;
      }
    }
  }
  return meilleur;
}

// Applique les règles mémorisées à une liste d'opérations.
// Retourne { preClassees: [{op, categorie, score}], aClasser: [op] }
function preClasserOperations(ops){
  const preClassees = [];
  const aClasser = [];
  ops.forEach(op => {
    if(op.categorie) return;
    const regle = chercherRegle(op.libelle, op.montant);
    if(regle){
      preClassees.push({ op, categorie: regle.categorie, score: regle.score });
    } else {
      aClasser.push(op);
    }
  });
  return { preClassees, aClasser };
}

function renderSectionCard(sectionKey){
  const section = CATEGORIES[sectionKey];
  const moisKey = STATE.moisActif;
  const reals = realParCategorie(moisKey);
  const prev = STATE.previsionnel[moisKey] || defaultPrevisionnel();
  const totalReal = totalSection(moisKey, sectionKey);
  const totalPrev = totalSectionPrevisionnel(moisKey, sectionKey);
  const sort = sectionSort[sectionKey];

  // Construire les lignes triées
  let items = section.items.map(cat => ({
    cat,
    r: reals[cat] || 0,
    p: prev[cat] !== undefined ? prev[cat] : 0
  }));

  if(sort.col === "alpha"){
    items.sort((a, b) => sort.dir === "asc"
      ? a.cat.localeCompare(b.cat, 'fr')
      : b.cat.localeCompare(a.cat, 'fr'));
  } else if(sort.col === "montant"){
    items.sort((a, b) => sort.dir === "asc" ? a.r - b.r : b.r - a.r);

  return `

function getOpValueForSort(op, col){
  if(col === "montant") return op.montant;
  if(col === "carte") return op.carte || "";
  if(col === "sousCategorie") return op.sousCategorie || "";
  if(col === "categorie") return op.categorie || "";
  if(col === "libelle") return (op.libelle || "").toLowerCase();
  return op.date;
}

function uniqueColumnValues(ops, col){
  const set = new Set();
  ops.forEach(op => {
    let v;
    if(col === "carte") v = op.carte || "—";
    else if(col === "sousCategorie") v = op.sousCategorie || "—";
    else if(col === "categorie") v = op.categorie || "À classer";
    else v = op[col];
    set.add(v);
  });
  return Array.from(set).sort((a,b) => String(a).localeCompare(String(b), 'fr'));
}

  // Filtres par colonne (clic sur en-tête)
  Object.entries(opsColumnFilters).forEach(([col, val]) => {
    ops = ops.filter(o => {
      let v;
      if(col === "carte") v = o.carte || "—";
      else if(col === "sousCategorie") v = o.sousCategorie || "—";
      else if(col === "categorie") v = o.categorie || "À classer";
      else v = o[col];
      return String(v) === String(val);

      <td>${op.carte ? escapeHtml(op.carte) : '<span class="muted">—</span>'}</td>
      <td>${op.sousCategorie ? escapeHtml(op.sousCategorie) : '<span class="muted">—</span>'}</td>
      <td class="amount-cell ${montantClass}">${op.montant>=0?'+':''}${fmtEUR(op.montant)}</td>
      <td>${catCell}</td>
      <td class="commentaire-cell">
        <input type="text" class="op-commentaire-input" data-op-id="${op.id}"
          value="${escapeAttr(commentaire)}" placeholder="…"
          style="width:100%; min-width:120px; border:1px solid transparent; background:transparent; font-size:12.5px;
          color:var(--ink); font-family:inherit; outline:none; padding:3px 6px; border-radius:5px; box-sizing:border-box;">
      </td>
    </tr>`;
  }).join("");

  const allVisibleIds = ops.map(o => o.id);
  const allSelected = allVisibleIds.length > 0 && allVisibleIds.every(id => selectedOpIds.has(id));
  const checkboxHeader = `<th class="col-check"><input type="checkbox" id="chkSelectAll" ${allSelected?'checked':''} title="Tout sélectionner"></th>`;

  const headerCells = checkboxHeader + OPS_COLUMNS.map(col => {
    const isSorted = opsSortColumn === col.key;
    const arrow = isSorted ? (opsSortDir === "asc" ? " ▲" : " ▼") : "";
    const hasFilter = opsColumnFilters.hasOwnProperty(col.key);
    const filterDot = hasFilter ? '<span class="filter-dot"></span>' : "";
    const alignStyle = col.align === "right" ? ' style="text-align:right"' : "";

    let filterMenuHtml = "";
    if(openFilterMenu === col.key){
      const values = uniqueColumnValues(allOps, col.key);
      const current = opsColumnFilters[col.key];
      const items = values.map(v =>
        `<div class="filter-menu-item ${current===v?'active':''}" data-filter-col="${col.key}" data-filter-val="${escapeAttr(v)}">${escapeHtml(String(v))}</div>`
      ).join("");
      filterMenuHtml = `
        <div class="filter-menu" data-filter-menu="${col.key}">
          <div class="filter-menu-item filter-menu-clear" data-filter-col="${col.key}" data-filter-val="__ALL__">Toutes les valeurs</div>
          ${items}
        </div>`;
    }

    return `<th${alignStyle}>
      <span class="th-sort" data-sort-col="${col.key}">${col.label}${arrow}</span>
      ${col.filterable ? `<span class="th-filter-btn ${hasFilter?'active':''}" data-filter-toggle="${col.key}">▾${filterDot}</span>` : ""}
      ${filterMenuHtml}
    </th>`;
  }).join("");

  const filtreActifCount = Object.keys(opsColumnFilters).length;
  const clearFiltersBtn = filtreActifCount > 0
    ? `<button class="btn btn-ghost btn-sm" id="btnClearColumnFilters">Effacer les filtres (${filtreActifCount})</button>`
    : "";

  const sousTotal = ops.reduce((s,o) => s + o.montant, 0);
  const sousTotalClass = sousTotal >= 0 ? "credit" : "debit";
  const filtresActifs = opsQuickFilter !== "toutes" || filtreActifCount > 0;
  const sousTotalLabel = filtresActifs
    ? `Sous-total (${ops.length} opération${ops.length>1?'s':''} affichée${ops.length>1?'s':''})`
    : `Total (${ops.length} opération${ops.length>1?'s':''})`;

  const selectionBar = selectedOpIds.size > 0 ? `
    <div class="selection-bar">
      <span>${selectedOpIds.size} opération${selectedOpIds.size>1?'s':''} sélectionnée${selectedOpIds.size>1?'s':''}</span>
      <button class="btn btn-primary btn-sm" id="btnClasserSelection">Classer la sélection →</button>
      <button class="btn btn-ghost btn-sm" id="btnDeselAll">Annuler la sélection</button>
    </div>` : "";

  return `
  <div class="ops-card">
    <div class="ops-head">
      <h3 class="ops-title display">Opérations du mois</h3>
      <div class="ops-filters">
        <span class="chip ${opsQuickFilter==='toutes'?'active':''}" data-filter="toutes">Toutes (${total})</span>
        <span class="chip ${opsQuickFilter==='aClasser'?'active':''}" data-filter="aClasser">À classer (${aClasser})</span>
        <span class="chip ${opsQuickFilter==='classees'?'active':''}" data-filter="classees">Classées (${total-aClasser})</span>
        ${clearFiltersBtn}
        <button class="btn btn-ghost btn-sm" id="btnResetMois" title="Remettre toutes les opérations à l'état à classer">↺ Reset classement</button>
      </div>
    </div>
    ${selectionBar}
    <div class="ops-subtotal-bar">
      <span class="ops-subtotal-label">${sousTotalLabel}</span>
      <span class="ops-subtotal-value ${sousTotalClass} display">${sousTotal>=0?'+':''}${fmtEUR(sousTotal,true)}</span>
    </div>
    <div class="ops-table-scroll">
      <table class="ops-table">
        <thead><tr>${headerCells}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderCategorieCell(op){
  if(op.categorie){
    return `
      <span class="cat-pill-wrap" data-cat-cell="${op.id}">
        <span class="cat-pill assigned" data-cat-toggle="${op.id}" title="Cliquer pour changer la catégorie">${escapeHtml(op.categorie)}</span>
        <button class="cat-reset-btn" data-uncategorize="${op.id}" title="Remettre à classer">✕</button>
      </span>
    `;
  }
  return `<span class="cat-pill empty" data-classify-one="${op.id}">À classer →</span>`;
}

function renderInlineCategorySelect(opId){
  const op = (STATE.operations[STATE.moisActif]||[]).find(o => o.id === opId);
  if(!op) return "";
  const sections = ["revenus","fixes","variables","epargne"];
  const optionsHtml = sections.map(secKey => {
    const sec = CATEGORIES[secKey];
    const opts = sec.items.map(cat =>
      `<option value="${escapeAttr(cat)}" ${op.categorie===cat?'selected':''}>${cat}</option>`
    ).join("");
    return `<optgroup label="${sec.label}">${opts}</optgroup>`;
  }).join("");
  return `<select class="inline-cat-select" data-inline-select="${opId}" autofocus>
    <option value="">— Choisir —</option>
    ${optionsHtml}
  </select>`;
}

function escapeHtml(s){
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
function escapeAttr(s){
  return String(s).replace(/"/g,'&quot;');
}

let toastTimer = null;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3200);
}

function attachTopbarEvents(){
  const btnToggle = document.getElementById("btnToggleSynthese");
  if(btnToggle){
    btnToggle.addEventListener("click", () => {
      currentView = currentView === "synthese" ? "dashboard" : "synthese";
      render();
    });
  }
  const btnExport = document.getElementById("btnExport");
  if(btnExport) btnExport.addEventListener("click", exportDonnees);

  const btnImportJSON = document.getElementById("btnImportJSON");
  const jsonFileInput = document.getElementById("jsonFileInput");
  if(btnImportJSON && jsonFileInput){
    btnImportJSON.addEventListener("click", () => jsonFileInput.click());
    jsonFileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if(file) openImportConfirm(file);
      e.target.value = "";
    });
  }

  const btnApprentissages = document.getElementById("btnGererApprentissages");
  if(btnApprentissages){
    btnApprentissages.addEventListener("click", () => ouvrirGestionApprentissages());
  }

  // ---- Sync indicator : clic gauche = forcer pull, clic droit = ouvrir config ----
  const syncEl = document.getElementById("syncIndicator");
  if(syncEl){
    syncEl.addEventListener("click", () => {
      if(!SYNC_CONFIG.enabled){
        ouvrirConfigSync();
      } else {
        // Mini menu : forcer pull ou ouvrir config
        const menu = document.createElement("div");
        menu.style.cssText = `
          position:fixed; background:var(--card); border:1px solid var(--line);
          border-radius:10px; box-shadow:0 8px 24px -8px rgba(0,0,0,0.18);
          z-index:100; padding:6px 0; min-width:200px; font-size:13px;
        `;
        const rect = syncEl.getBoundingClientRect();
        menu.style.top = (rect.bottom + 6) + "px";
        menu.style.right = (window.innerWidth - rect.right) + "px";

        // Infos sur la dernière sync
        const infoHtml = syncState.lastUpdatedBy
          ? `<div style="padding:8px 14px 4px; font-size:11px; color:var(--ink-soft);">Dernière sync : ${syncState.lastUpdatedBy}</div>`
          : "";

        menu.innerHTML = `
          ${infoHtml}
          <div class="sync-menu-item" id="syncMenuPull">↓ Charger depuis le cloud</div>
          <div class="sync-menu-item" id="syncMenuConfig">⚙ Paramètres de sync</div>
        `;
        document.body.appendChild(menu);
        menu.querySelector("#syncMenuPull").addEventListener("click", () => { menu.remove(); forcePull(); });
        menu.querySelector("#syncMenuConfig").addEventListener("click", () => { menu.remove(); ouvrirConfigSync(); });
        setTimeout(() => document.addEventListener("click", () => menu.remove(), { once: true }), 50);
      }
    });
    updateSyncIndicator();
  }

  if(currentView === "dashboard"){
    const moisSelect = document.getElementById("moisSelect");
    if(moisSelect){
      moisSelect.addEventListener("change", (e) => {
        STATE.moisActif = e.target.value;
        opsQuickFilter = "toutes";
        opsColumnFilters = {};
        openFilterMenu = null;
        drillDownSection = null;
        selectedOpIds.clear();
        render();
      });
    }
    const btnNouveauMois = document.getElementById("btnNouveauMois");
    if(btnNouveauMois) btnNouveauMois.addEventListener("click", openNouveauMoisModal);
    const btnImportCSV = document.getElementById("btnImportCSV");
    if(btnImportCSV) btnImportCSV.addEventListener("click", () => document.getElementById("csvFileInput").click());
    const csvFileInput = document.getElementById("csvFileInput");
    if(csvFileInput) csvFileInput.addEventListener("change", handleCSVFile);
    const btnClasser = document.getElementById("btnClasser");
    if(btnClasser) btnClasser.addEventListener("click", () => openClassificationModal());

    const btnPreclassManuel = document.getElementById("btnPreclassManuel");
    if(btnPreclassManuel){
      btnPreclassManuel.addEventListener("click", () => {
        const moisKey = STATE.moisActif;
        const ops = (STATE.operations[moisKey]||[]).filter(o => !o.categorie);
        if(ops.length === 0){
          showToast("Toutes les opérations de ce mois sont déjà classées.");
          return;
        }
        if(!STATE.regles || Object.keys(STATE.regles).length === 0){
          showToast("Aucune règle d'apprentissage mémorisée. Classez d'abord quelques opérations pour entraîner la reconnaissance.");
          return;
        }
        const { preClassees } = preClasserOperations(ops);
        if(preClassees.length === 0){
          showToast("Aucune opération reconnue parmi les règles mémorisées.");
          return;
        }
        const items = preClassees.map(item => ({ ...item, moisKey }));
        ouvrirValidationPreclassificationMultiMois(items);
      });
    }
  }
}

function attachDashboardEvents(){
  attachTopbarEvents();

  const btnClasserHero = document.getElementById("btnClasserHero");
  if(btnClasserHero) btnClasserHero.addEventListener("click", () => openClassificationModal());

  document.querySelectorAll(".section-sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const sec = btn.dataset.section;
      const col = btn.dataset.sortCol;
      if(sectionSort[sec].col === col){
        sectionSort[sec].dir = sectionSort[sec].dir === "asc" ? "desc" : "asc";
      } else {
        sectionSort[sec].col = col;
        sectionSort[sec].dir = col === "montant" ? "desc" : "asc";
      }
      render();
    });
  });

  document.querySelectorAll(".cat-prev-input").forEach(input => {
    input.addEventListener("change", (e) => {
      const cat = e.target.dataset.cat;
      const val = parseFloat(e.target.value) || 0;
      STATE.previsionnel[STATE.moisActif][cat] = val;
      saveState();
      render();
    });
  });

  // ---- Solde début de mois (éditable) ----
  const soldeDebutInput = document.getElementById("soldeDebutInput");
  if(soldeDebutInput){
    soldeDebutInput.addEventListener("change", (e) => {
      const val = parseFloat(e.target.value) || 0;
      setSoldeDebut(STATE.moisActif, val);
      render();
      showToast("Solde de début de mois mis à jour.");
    });
  }

  // ---- Notes mensuelles (sauvegarde debouncée à la frappe) ----
  const notesTextarea = document.getElementById("notesMoisTextarea");
  if(notesTextarea){
    let notesDebounce;
    notesTextarea.addEventListener("input", (e) => {
      clearTimeout(notesDebounce);
      notesDebounce = setTimeout(() => {
        if(!STATE.notes) STATE.notes = {};
        STATE.notes[STATE.moisActif] = e.target.value;
        saveState(); // déclenche aussi le push vers Sheets
      }, 800);
    });
  }

  // ---- Commentaires opérations (debounce 600ms) ----
  let commentDebounceTimers = {};
  document.querySelectorAll(".op-commentaire-input").forEach(input => {
    // Bordure au focus
    input.addEventListener("focus", () => { input.style.border = "1px solid var(--line)"; input.style.background = "var(--cream)"; });
    input.addEventListener("blur",  () => { input.style.border = "1px solid transparent"; input.style.background = "transparent"; });
    input.addEventListener("input", (e) => {
      const opId = input.dataset.opId;
      clearTimeout(commentDebounceTimers[opId]);
      commentDebounceTimers[opId] = setTimeout(() => {
        if(!STATE.commentaires) STATE.commentaires = {};
        const val = e.target.value.trim();
        if(val) STATE.commentaires[opId] = val;
        else delete STATE.commentaires[opId];
        saveState();
      }, 600);
    });
  });

  // ---- Filtres rapides (chips) ----
  document.querySelectorAll(".chip[data-filter]").forEach(chip => {
    chip.addEventListener("click", (e) => {
      opsQuickFilter = e.target.dataset.filter;
      render();
    });
  });

  // ---- Tri par en-tête ----
  document.querySelectorAll(".th-sort[data-sort-col]").forEach(el => {
    el.addEventListener("click", (e) => {
      const col = e.currentTarget.dataset.sortCol;
      if(opsSortColumn === col){
        opsSortDir = opsSortDir === "asc" ? "desc" : "asc";
      } else {
        opsSortColumn = col;
        opsSortDir = "asc";
      }
      openFilterMenu = null;
      render();
    });
  });

  // ---- Filtres par colonne ----
  document.querySelectorAll("[data-filter-toggle]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const col = e.currentTarget.dataset.filterToggle;
      openFilterMenu = openFilterMenu === col ? null : col;
      render();
    });
  });
  document.querySelectorAll("[data-filter-col]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const col = e.currentTarget.dataset.filterCol;
      const val = e.currentTarget.dataset.filterVal;
      if(val === "__ALL__") delete opsColumnFilters[col];
      else opsColumnFilters[col] = val;
      openFilterMenu = null;
      render();
    });
  });
  document.querySelectorAll(".filter-menu").forEach(menu => {
    menu.addEventListener("click", (e) => e.stopPropagation());
  });
  if(openFilterMenu){
    document.addEventListener("click", closeFilterMenuOnce, { once: true });
  }
  const clearBtn = document.getElementById("btnClearColumnFilters");
  if(clearBtn){
    clearBtn.addEventListener("click", () => { opsColumnFilters = {}; render(); });
  }

  // ---- Checkboxes : sélection multiple ----
  const chkAll = document.getElementById("chkSelectAll");
  if(chkAll){
    chkAll.addEventListener("change", () => {
      // On lit les IDs directement depuis les checkboxes actuellement rendues
      // (elles représentent exactement les lignes filtrées visibles)
      const checkboxesVisibles = document.querySelectorAll(".op-checkbox");
      if(chkAll.checked){
        checkboxesVisibles.forEach(cb => selectedOpIds.add(cb.dataset.opId));
      } else {
        checkboxesVisibles.forEach(cb => selectedOpIds.delete(cb.dataset.opId));
      }
      render();
    });
  }
  document.querySelectorAll(".op-checkbox").forEach(cb => {
    cb.addEventListener("change", (e) => {
      const opId = e.currentTarget.dataset.opId;
      if(e.currentTarget.checked) selectedOpIds.add(opId);
      else selectedOpIds.delete(opId);
      render();
    });
  });

  // ---- Classer la sélection ----
  const btnClasserSel = document.getElementById("btnClasserSelection");
  if(btnClasserSel){
    btnClasserSel.addEventListener("click", () => {
      const ids = Array.from(selectedOpIds);
      if(ids.length === 0) return;
      openClassificationModal(null, ids);
    });
  }
  const btnDeselAll = document.getElementById("btnDeselAll");
  if(btnDeselAll){
    btnDeselAll.addEventListener("click", () => { selectedOpIds.clear(); render(); });
  }

  // ---- Cellule catégorie : classer (popup), réaffecter (popup), déclasser ----
  document.querySelectorAll("[data-classify-one]").forEach(el => {
    el.addEventListener("click", (e) => {
      openClassificationModal(e.currentTarget.dataset.classifyOne);
    });
  });
  document.querySelectorAll("[data-cat-toggle]").forEach(el => {
    el.addEventListener("click", (e) => {
      // Réaffectation : ouvre la popup sur cette seule opération
      openClassificationModal(e.currentTarget.dataset.catToggle);
    });
  });
  document.querySelectorAll("[data-uncategorize]").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      declasserOperation(STATE.moisActif, e.currentTarget.dataset.uncategorize);
      render();
      showToast("Opération remise à classer.");
    });
  });

  // ---- Reset classement du mois ----
  const btnResetMois = document.getElementById("btnResetMois");
  if(btnResetMois) btnResetMois.addEventListener("click", () => openResetMoisConfirm());

  // ---- Menu "Options du mois" (réinit opérations / suppression onglet) ----
  const btnMoisOptions = document.getElementById("btnMoisOptions");
  if(btnMoisOptions){
    btnMoisOptions.addEventListener("click", (e) => {
      e.stopPropagation();
      moisOptionsOpen = !moisOptionsOpen;
      render();
    });
  }
  if(moisOptionsOpen){
    document.addEventListener("click", closeMoisOptionsOnce, { once: true });
  }
  const btnReinitMois = document.getElementById("btnReinitMoisComplet");
  if(btnReinitMois){
    btnReinitMois.addEventListener("click", () => {
      moisOptionsOpen = false;
      openReinitMoisCompletConfirm();
    });
  }
  const btnSupprimerMoisOnglet = document.getElementById("btnSupprimerMoisOnglet");
  if(btnSupprimerMoisOnglet){
    btnSupprimerMoisOnglet.addEventListener("click", () => {
      moisOptionsOpen = false;
      openSuppressionMoisConfirm();
    });
  }
}

function closeMoisOptionsOnce(){
  if(moisOptionsOpen){
    moisOptionsOpen = false;
    render();
  }
}

function closeFilterMenuOnce(){
  if(openFilterMenu){
    openFilterMenu = null;
    render();
  }
}

// ---------- Import CSV ----------
function handleCSVFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try{
      const ops = parseCSVBancaire(evt.target.result);
      if(ops.length === 0){
        showToast("Aucune opération détectée dans ce fichier. Vérifiez le format.");
        return;
      }

      const moisAvantImport = STATE.moisActif;
      const resultat = importerOperationsMultiMois(ops);

      if(resultat.totalAjoutees === 0){
        showToast("Toutes les opérations de ce fichier étaient déjà importées.");
        return;
      }

      // Se positionner sur le dernier mois concerné par l'import (le plus récent)
      const dernierMois = resultat.moisConcernes[resultat.moisConcernes.length - 1];
      if(dernierMois) STATE.moisActif = dernierMois;
      saveState();

      // Message récapitulatif
      if(resultat.moisConcernes.length > 1){
        const detail = resultat.moisConcernes
          .map(m => `${moisLabel(m)} (${resultat.parMois[m]})`)
          .join(", ");
        const creesMsg = resultat.moisCrees.length > 0
          ? ` — ${resultat.moisCrees.length} onglet${resultat.moisCrees.length>1?'s':''} créé${resultat.moisCrees.length>1?'s':''} automatiquement`
          : "";
        showToast(`${resultat.totalAjoutees} opération(s) réparties sur ${resultat.moisConcernes.length} mois${creesMsg} : ${detail}.`);
      } else {
        const creesMsg = resultat.moisCrees.length > 0 ? " (nouvel onglet créé)" : "";
        showToast(`${resultat.totalAjoutees} opération(s) importée(s) pour ${moisLabel(dernierMois)}${creesMsg}.`);
      }

      render();

      // Pré-classification automatique basée sur les règles mémorisées,
      // appliquée à tous les mois concernés par cet import (pas seulement le mois actif)
      if(STATE.regles && Object.keys(STATE.regles).length > 0){
        let totalPreClassees = [];
        resultat.moisConcernes.forEach(moisKey => {
          const nouvelles = (STATE.operations[moisKey]||[]).filter(o => !o.categorie);
          const { preClassees } = preClasserOperations(nouvelles);
          preClassees.forEach(item => totalPreClassees.push({ ...item, moisKey }));
        });
        if(totalPreClassees.length > 0){
          setTimeout(() => ouvrirValidationPreclassificationMultiMois(totalPreClassees), 400);
        }
      }
    }catch(err){
      console.error(err);
      showToast("Erreur lors de la lecture du fichier CSV.");
    }
  };
  reader.readAsText(file, "UTF-8");
  e.target.value = "";
}

function parseCSVBancaire(text){
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if(lines.length < 2) return [];

  const header = lines[0].split(";");
  const idx = (name) => header.findIndex(h => h.trim().toLowerCase() === name.toLowerCase());

  const iDate = idx("Date de comptabilisation");
  const iLibelle = idx("Libelle simplifie");
  const iLibelleOp = idx("Libelle operation");
  const iDetail = idx("Informations complementaires");
  const iSousCat = idx("Sous categorie");
  const iDebit = idx("Debit");
  const iCredit = idx("Credit");

  const useDefaults = iDate === -1 || iDebit === -1;
  const colDate = useDefaults ? 0 : iDate;
  const colLibelle = useDefaults ? 1 : iLibelle;
  const colLibelleOp = useDefaults ? 2 : iLibelleOp;
  const colDetail = useDefaults ? 4 : iDetail;
  const colSousCat = useDefaults ? 7 : iSousCat;
  const colDebit = useDefaults ? 8 : iDebit;
  const colCredit = useDefaults ? 9 : iCredit;

  const ops = [];
  for(let i=1; i<lines.length; i++){
    const cols = lines[i].split(";");
    if(cols.length <= Math.max(colDate, colLibelle, colDebit)) continue;

    const dateStr = (cols[colDate]||"").trim();
    const m = dateStr.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
    if(!m) continue;
    const isoDate = `${m[3]}-${m[2]}-${m[1]}`;

    const libelle = (cols[colLibelle]||"").trim();
    const libelleOperation = (cols[colLibelleOp]||"").trim();
    const detail = (cols[colDetail]||"").trim();
    const sousCategorie = (cols[colSousCat]||"").trim();
    const debitStr = (cols[colDebit]||"").trim();
    const creditStr = (cols[colCredit]||"").trim();

    let montant;
    if(creditStr){
      montant = parseFloat(creditStr.replace(",","."));
    } else if(debitStr){
      montant = parseFloat(debitStr.replace(",","."));
    } else {
      continue;
    }
    if(isNaN(montant)) continue;

    const carte = extractCarteFromDetail(detail);

    ops.push({ date: isoDate, libelle, libelleOperation, detail, sousCategorie, carte, montant });
  }
  return ops;
}

function extractCarteFromDetail(detail){
  if(/CB\*{2,}2622/.test(detail)) return "CB Cyrille";
  if(/CB\*{2,}4138/.test(detail)) return "CB Cedric";
  return null;
}

// ---------- Export / sauvegarde manuelle ----------
function exportDonnees(){
  const blob = new Blob([JSON.stringify(STATE, null, 1)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `budget-famille-sauvegarde-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("Sauvegarde téléchargée.");
}

function importerDonneesJSON(file){
  const reader = new FileReader();
  reader.onload = (evt) => {
    try{
      const data = JSON.parse(evt.target.result);
      if(!data.operations || !data.moisListe){
        showToast("Fichier de sauvegarde invalide.");
        return;
      }
      STATE = data;
      if(!STATE.soldeCompte) STATE.soldeCompte = {};
      if(!STATE.regles) STATE.regles = {};
      if(!STATE.notes) STATE.notes = {};
      if(!STATE.commentaires) STATE.commentaires = {};
      // Compatibilité anciennes sauvegardes : nettoyer finManuel
      Object.keys(STATE.soldeCompte).forEach(k => {
        if(STATE.soldeCompte[k].finManuel !== undefined) delete STATE.soldeCompte[k].finManuel;
      });
      saveState();
      currentView = "dashboard";
      opsQuickFilter = "toutes";
      opsColumnFilters = {};
      openFilterMenu = null;
      drillDownSection = null;
      render();
      showToast("Données restaurées avec succès.");
    }catch(err){
      showToast("Impossible de lire ce fichier de sauvegarde.");
    }
  };
  reader.readAsText(file, "UTF-8");
}

// =========================================================
// MODAL DE CLASSIFICATION
// =========================================================

let classificationQueue = [];
let classificationDone = 0;
let classificationTotal = 0;
let classificationMode = "one-by-one"; // "one-by-one" | "group"

function openClassificationModal(specificOpId, opIdList){
  const moisKey = STATE.moisActif;
  const ops = STATE.operations[moisKey] || [];

  if(opIdList && opIdList.length > 0){
    // Mode sélection multiple : on classe toutes les ops de la liste avec la même catégorie
    // On ouvre la popup sur la première, et en validant ça applique à toutes
    classificationQueue = [...opIdList];
    classificationMode = "group"; // applique la catégorie choisie à tous d'un coup
  } else if(specificOpId){
    classificationQueue = [specificOpId];
    classificationMode = "one-by-one";
  } else {
    classificationQueue = ops.filter(o => !o.categorie).map(o => o.id);
    classificationMode = "one-by-one";
  }

  if(classificationQueue.length === 0){
    showToast("Toutes les opérations sont déjà classées !");
    return;
  }

  classificationTotal = classificationQueue.length;
  classificationDone = 0;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay open";
  overlay.id = "classifyOverlay";
  document.body.appendChild(overlay);

  renderClassificationStep();

  overlay.addEventListener("click", (e) => {
    if(e.target === overlay) closeClassificationModal();
  });
  document.addEventListener("keydown", handleClassifyKeydown);
}

function closeClassificationModal(){
  const overlay = document.getElementById("classifyOverlay");
  if(overlay) overlay.remove();
  document.removeEventListener("keydown", handleClassifyKeydown);
  render();
}

function handleClassifyKeydown(e){
  if(e.key === "Escape") closeClassificationModal();
}

function renderClassificationStep(){
  const overlay = document.getElementById("classifyOverlay");
  if(!overlay) return;

  if(classificationQueue.length === 0){
    closeClassificationModal();
    showToast("Toutes les opérations sont classées !");
    return;
  }

  const moisKey = STATE.moisActif;
  const opId = classificationQueue[0];
  const op = (STATE.operations[moisKey]||[]).find(o => o.id === opId);

  if(!op){
    classificationQueue.shift();
    renderClassificationStep();
    return;
  }

  const montantClass = op.montant >= 0 ? "credit" : "debit";
  const numero = classificationDone + 1;
  const isCredit = op.montant >= 0;

  // En mode groupé, vérifier si la sélection est homogène (tout crédit ou tout débit)
  let groupMixte = false;
  let groupToutCredit = false;
  if(classificationMode === "group"){
    const moisKey = STATE.moisActif;
    const ops = (STATE.operations[moisKey]||[]);
    const queueMontants = classificationQueue.map(id => (ops.find(o=>o.id===id)||{}).montant||0);
    groupToutCredit = queueMontants.every(m => m >= 0);
    const groupToutDebit = queueMontants.every(m => m < 0);
    groupMixte = !groupToutCredit && !groupToutDebit;
  }

  // Sections affichées selon le sens de l'opération
  // Crédit → Revenus uniquement
  // Débit  → Fixes, Variables, Épargne uniquement
  const allSections = ["revenus","fixes","variables","epargne"];
  const sectionTitles = {
    revenus: "t-revenus", fixes: "t-fixes", variables: "t-variables", epargne: "t-epargne"
  };

  const sectionsActives = classificationMode === "group"
    ? (groupMixte ? allSections : (groupToutCredit ? ["revenus"] : ["fixes","variables","epargne"]))
    : (isCredit ? ["revenus"] : ["fixes","variables","epargne"]);

  const catBlocks = allSections.map(secKey => {
    const sec = CATEGORIES[secKey];
    const active = sectionsActives.includes(secKey);
    const stamps = sec.items.map(cat =>
      `<button class="cat-stamp ${sectionTitles[secKey]}${active?'':' cat-stamp--disabled'}"
        data-cat="${escapeAttr(cat)}"
        ${active?'':'disabled title="Non compatible avec le sens de cette opération"'}
      >${cat}</button>`
    ).join("");
    return `
      <div class="cat-section-title ${sectionTitles[secKey]}" style="${active?'':'opacity:0.35; filter:grayscale(1);'}">${sec.label}${active?'':' <span style="font-size:10px; font-weight:400; letter-spacing:0;">(non applicable)</span>'}</div>
      <div class="cat-grid" style="${active?'':'opacity:0.35; pointer-events:none;'}">${stamps}</div>
    `;
  }).join("");

  const modeGroupLabel = classificationMode === "group" && classificationQueue.length > 1
    ? `<div style="font-size:12px; color:var(--terracotta); font-weight:600; margin-top:4px;">Cette catégorie sera appliquée à ${classificationQueue.length} opérations sélectionnées</div>`
    : "";

  const mixteBanner = groupMixte
    ? `<div style="padding:8px 16px; background:var(--ambre-soft); border-bottom:1px solid var(--line); font-size:12.5px; color:var(--ambre); font-weight:600;">
        ⚠️ Sélection mixte : crédits et débits mélangés. Toutes les catégories sont disponibles — vérifiez la cohérence de votre classement.
       </div>`
    : "";

  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div class="modal-progress">${classificationMode === "group" && classificationQueue.length > 1 ? `Classement groupé — ${classificationQueue.length} opérations` : `Opération ${numero} / ${classificationTotal}`}</div>
          <div class="modal-op-libelle display">${escapeHtml(op.libelle)}</div>
          <div class="modal-op-detail">${fmtDateFr(op.date)}${op.detail ? " · " + escapeHtml(op.detail) : ""}</div>
          ${modeGroupLabel}
        </div>
        <div class="modal-op-amount ${montantClass} display">${op.montant>=0?'+':''}${fmtEUR(op.montant,true)}</div>
        <button class="modal-close" id="closeClassifyBtn" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-body">
        ${mixteBanner}
        ${catBlocks}
      </div>
      <div class="modal-foot">
        ${classificationMode !== "group" ? `<button class="btn btn-ghost btn-sm" id="skipOpBtn">Passer cette opération</button>` : `<span></span>`}
        <span style="font-size:12px; color:var(--ink-soft);">Cliquez sur une catégorie pour valider</span>
      </div>
    </div>
  `;

  overlay.querySelector("#closeClassifyBtn").addEventListener("click", closeClassificationModal);
  const skipBtn = overlay.querySelector("#skipOpBtn");
  if(skipBtn){
    skipBtn.addEventListener("click", () => {
      const skipped = classificationQueue.shift();
      classificationQueue.push(skipped);
      if(classificationQueue.length === 1){
        closeClassificationModal();
        showToast("Opération mise de côté. Relancez le classement pour la traiter.");
        return;
      }
      renderClassificationStep();
    });
  }
  overlay.querySelectorAll(".cat-stamp").forEach(btn => {
    btn.addEventListener("click", () => {
      const moisKey = STATE.moisActif;
      const categorie = btn.dataset.cat;

      if(classificationMode === "group"){
        classificationQueue.forEach(id => {
          const op = (STATE.operations[moisKey]||[]).find(o => o.id === id);
          if(op){
            classerOperation(moisKey, id, categorie);
            apprentissage(op.libelle, categorie, op.montant);
          }
        });
        selectedOpIds.clear();
        closeClassificationModal();
        showToast(`${classificationTotal} opération${classificationTotal>1?'s':''} classée${classificationTotal>1?'s':''} en "${categorie}".`);
      } else {
        classerOperation(moisKey, opId, categorie);
        const op = (STATE.operations[moisKey]||[]).find(o => o.id === opId);
        if(op) apprentissage(op.libelle, categorie, op.montant);
        classificationQueue.shift();
        classificationDone++;
        renderClassificationStep();
      }
    });
  });
}
